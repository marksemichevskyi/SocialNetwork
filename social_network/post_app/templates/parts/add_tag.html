<form method="POST" action="{% url 'add_tag' %}" class="tag_form">

    {% csrf_token %}

    <div class="add_tag">

        <div class="tag_close">
            ×
        </div>

        <div class="tag_title">
            Додати хештег
        </div>

        <div class="tag_field">

            <div class="tag_label">
                Назва
            </div>

            <input
                type="text"
                name="name"
                class="tag_input"
                placeholder="#"
            >

        </div>

        <div class="tag_buttons">

            <button
                type="button"
                class="tag_button_close"
            >
                Скасувати
            </button>

            <button
                type="submit"
                class="tag_button_save"
            >
                Зберегти
            </button>

        </div>

    </div>

</form>
