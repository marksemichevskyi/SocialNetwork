{% extends "base.html" %}

{% load static %}

{% block content %} 
    <div id="indiv-chats">
        <h1>Повідомлення</h1>
        {% for chat_data in individual_chats %}
            <div class="chat" data-id="{{ chat_data.chat_id }}" style="border: 2px solid black; padding: 12px; width: max-content; cursor: pointer; margin: 10px;">
                <h3>{{ chat_data.other_user.email }}</h3>
            </div>
        {% endfor %}
    </div> 
    <div id="not-select">
        <h1 style="text-align: center;">Почніть нове спілкування</h1>
        <p style="text-align: center;">Оберіть контакт зі списку ліворуч <br> або створіть групу, щоб почати спілкування</p>
    </div>
    <div id="chat" style="display: none; margin: 100px;">
        <div id="messages"></div>
        <div id="control-elements">
            <input type="text" id="msg-input">
            <button id="send-msg">Send</button>
        </div>
    </div>
    <script src = "{% static 'chat.js' %}"></script>
{%endblock%}
